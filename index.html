
<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <title>SubTeach Pro - 代課管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      /* 安全區域：支援有劉海／圓角的手機與平板 */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      body {
        font-family: 'Noto Sans TC', sans-serif;
        /* 全站背景：淡灰到淡紫灰漸層，不搶內容 */
        background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 35%, #e2e8f0 100%);
        min-height: 100vh;
        padding-left: var(--sal);
        padding-right: var(--sar);
        /* 觸控優化：減少點擊高亮、改善按鈕點擊體驗 */
        -webkit-tap-highlight-color: rgba(79, 70, 229, 0.15);
        -webkit-touch-callout: none;
      }
      /* 可點擊元素至少約 44px 高，利於手指操作 */
      @media (max-width: 768px) {
        button, [role="button"], .touch-target-min { min-height: 44px; }
      }
      /* Print Styles：預設上下左右邊界 0.5cm */
      @media print {
        @page {
          margin: 0.5cm;
        }
        body * {
          visibility: hidden;
        }
        .printable-area, .printable-area * {
          visibility: visible;
        }
        .printable-area {
          position: fixed;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          background: white;
          z-index: 9999;
          padding: 0;
        }
        /* Hide non-essential elements inside the printable area if needed */
        .no-print {
          display: none !important;
        }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>

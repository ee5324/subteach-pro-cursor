    <style>
      body {
        font-family: 'Noto Sans TC', sans-serif;
      }
      
      /* 強制列印樣式：與開課通知單一致，不強制 visibility，由各頁 .no-print 隱藏 UI */
      @media print {
        @page { 
          size: A4 landscape;
          margin: 8mm;
        }
        html, body {
          margin: 0 !important;
          padding: 0 !important;
          background: #fff !important;
        }
        .no-print, .no-print * {
          display: none !important;
        }
        table {
          border-collapse: collapse !important;
        }
      }
    </style>
